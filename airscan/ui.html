<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirScan-QR</title>
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">Air<span>Scan</span>-QR <small>屏幕二维码流 · PC → PC</small></div>
    <nav class="tabs" aria-label="工作模式">
      <button class="tab active" id="tab-send" onclick="switchTab('send')">发送</button>
      <button class="tab" id="tab-recv" onclick="switchTab('recv')">接收</button>
    </nav>
  </header>

  <main class="content">
    <section class="panel send-panel show" id="panel-send">
      <div class="card send-card">
        <textarea id="inputText" aria-label="发送文本"
          placeholder="输入要发送的文本，或点下方按钮选择文件..."></textarea>
        <div class="row source-row">
          <button class="btn btn-gray" onclick="pickFile()">选择文件</button>
          <button class="btn btn-primary" id="btnSwap" onclick="startSend()"
            title="用当前文本或文件替换正在广播的内容">发送</button>
          <span class="field-name" id="fileName">未选择文件</span>
          <button class="btn-del" id="btnClearFile" onclick="clearFile()"
            style="display:none" aria-label="移除所选文件">×</button>
        </div>
        <div class="row settings-row">
          <label class="lbl" for="gridSel">宫格</label>
          <select id="gridSel" onchange="onGridChange()">
            <option value="1" selected>1×1</option>
            <option value="2">2×2</option>
            <option value="3">3×3</option>
          </select>
          <label class="lbl" for="errSel">纠错</label>
          <select id="errSel">
            <option value="l">L 低</option>
            <option value="m" selected>M 中</option>
            <option value="q">Q 高</option>
          </select>
          <label class="lbl" for="fpsRange">FPS</label>
          <input type="range" id="fpsRange" min="1" max="20" value="8"
            oninput="onFpsInput(this)">
          <span class="val" id="fpsVal">8</span>
          <label class="lbl" for="startIndex">起始序号</label>
          <input class="number-input" type="number" id="startIndex" min="1" value="1"
            inputmode="numeric" title="从指定帧开始顺序循环发送">
        </div>
        <details class="resend-tools">
          <summary>缺失序号补发</summary>
          <div class="resend-row">
            <input class="resend-input" id="resendSpec" type="text"
              aria-label="缺失序号" placeholder="例如 181, 283, 546-559">
            <button class="btn btn-gray" id="btnResend" onclick="startResend()" disabled>补发缺失帧</button>
            <button class="btn btn-gray" id="btnResumeAll" onclick="resumeAllFrames()" disabled>恢复全部帧</button>
          </div>
        </details>
        <div class="btn-grid">
          <button class="btn btn-gray" id="btnPauseSend" onclick="pauseSend()" disabled>暂停</button>
          <button class="btn btn-primary" id="btnSend" onclick="startOrResumeSend()">开始广播</button>
        </div>
      </div>
      <div class="focus-strip">
        <button class="focus-toggle" id="btnQrFocus" onclick="toggleQrFocus()"
          aria-label="隐藏控制区" aria-pressed="false" title="隐藏控制区">▲</button>
      </div>
      <div class="qr-stage" id="qrStage">
        <span class="placeholder">二维码将显示在这里</span>
      </div>
      <div class="statusbar" id="sendStatus">就绪</div>
    </section>

    <section class="panel" id="panel-recv">
      <div class="card">
        <div class="row" style="margin-top:0">
          <select id="winSel" style="flex:1" onchange="onWinPick()">
            <option value="">选择要接收的窗口...</option>
          </select>
          <button class="btn btn-gray" onclick="refreshWindows()">刷新</button>
        </div>
        <div class="hint-line">锁定发送端窗口后，即使它被遮挡或在后台也能持续接收。发送端窗口不要最小化。</div>
        <div class="download-line">
          <span>自动保存到</span>
          <span class="download-path" id="downloadDir">Downloads</span>
          <button class="btn btn-gray" onclick="openDownloadDir()">打开目录</button>
        </div>
        <div class="row recv-actions">
          <button class="btn btn-primary" id="btnRecv" onclick="startRecv()" disabled>开始接收</button>
          <button class="btn btn-gray" id="btnPauseRecv" onclick="pauseRecv()" disabled>暂停</button>
          <button class="btn btn-gray" id="btnResetRecv" onclick="resetRecv()" disabled>重置任务</button>
          <button class="btn btn-gray" id="btnMissing" onclick="showMissing()" disabled>查看缺失序号</button>
        </div>
      </div>
      <div class="prog-line">
        <span class="recv-file" id="recvFile"></span>
        <span class="prog-num" id="progBig">-</span>
        <div class="pbar-wrap"><div class="pbar" id="pbar"></div></div>
      </div>
      <div class="statusbar" id="recvStatus">就绪 · 选择窗口后开始接收</div>
      <section class="msg-section" id="msgSection" style="display:none">
        <div class="msg-title">收到的文本消息</div>
        <div class="msg-list" id="msgList"></div>
      </section>
    </section>
  </main>

  <div id="toast" role="status"></div>
  <div class="modal-backdrop" id="missingModal" role="dialog" aria-modal="true"
    aria-labelledby="missingTitle" onclick="onMissingBackdrop(event)">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="missingTitle">缺失序号</div>
        <button class="modal-close" onclick="closeMissing()" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="missing-meta" id="missingMeta"></div>
        <div class="missing-ranges" id="missingRanges">暂无接收任务</div>
        <div class="modal-actions">
          <button class="btn btn-gray" onclick="closeMissing()">关闭</button>
          <button class="btn btn-primary" onclick="copyMissing()">复制序号</button>
        </div>
      </div>
    </div>
  </div>
  <script src="ui.js"></script>
</body>
</html>
